stages:
  - test
  - build
  - package
  - release

variables:
  ELECTRON_CACHE: $CI_PROJECT_DIR/.cache/electron
  ELECTRON_BUILDER_CACHE: $CI_PROJECT_DIR/.cache/electron-builder
  pnpm_version: "11"

# -------------------------------------------------------
# Cache: pnpm store + electron caches
# -------------------------------------------------------
.pnpm_cache: &pnpm_cache
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - .cache/electron
      - .cache/electron-builder

.pnpm_before: &pnpm_before
  before_script:
    - corepack enable
    - corepack prepare pnpm@${pnpm_version} --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

# -------------------------------------------------------
# Rules
# -------------------------------------------------------
.rule_release: &rule_release
  - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

.rule_merge: &rule_merge
  - if: $CI_MERGE_REQUEST_IID
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# -------------------------------------------------------
# Test (runs on MRs and default branch)
# -------------------------------------------------------
typecheck:
  stage: test
  tags: [macos]
  <<: *pnpm_cache
  <<: *pnpm_before
  rules: *rule_merge
  script:
    - pnpm typecheck

unit-test:
  stage: test
  tags: [macos]
  <<: *pnpm_cache
  <<: *pnpm_before
  rules: *rule_merge
  script:
    - pnpm test

# -------------------------------------------------------
# Build (compile main / preload / renderer)
# -------------------------------------------------------
compile:
  stage: build
  tags: [macos]
  <<: *pnpm_cache
  <<: *pnpm_before
  rules: *rule_release
  script:
    - pnpm build
  artifacts:
    paths:
      - out/
    expire_in: 1 day

# -------------------------------------------------------
# Package: unsigned DMG
# -------------------------------------------------------
package:macos:
  stage: package
  tags: [macos]
  <<: *pnpm_cache
  <<: *pnpm_before
  rules: *rule_release
  needs: [compile]
  script:
    - rm -rf release
    - CUSTOM_DMGBUILD_PATH="$(sh scripts/prepare-dmgbuild.sh)"
      CSC_IDENTITY_AUTO_DISCOVERY=false
      pnpm exec electron-builder --mac --publish never -c.mac.notarize=false
    - find release -maxdepth 2 -type d -name '*.app' | head -1 | grep -q . || { echo "No .app bundle found" >&2; exit 1; }
    - find release -maxdepth 1 -type f -name '*.dmg' | head -1 | grep -q . || { echo "No .dmg found" >&2; exit 1; }
    - find release -maxdepth 1 -type f -name '*.dmg' -exec hdiutil verify {} \;
  artifacts:
    paths:
      - release/*.dmg
      - release/*.zip
    expire_in: 30 days

# -------------------------------------------------------
# Package: source archive
# -------------------------------------------------------
package:source:
  stage: package
  tags: [macos]
  rules: *rule_release
  needs: []
  script:
    - mkdir -p release-src
    - git archive --format=tar.gz --prefix="buddy-macos-${CI_COMMIT_TAG}/"
        -o "release-src/buddy-macos-${CI_COMMIT_TAG}-source.tar.gz" HEAD
    - git archive --format=zip --prefix="buddy-macos-${CI_COMMIT_TAG}/"
        -o "release-src/buddy-macos-${CI_COMMIT_TAG}-source.zip" HEAD
  artifacts:
    paths:
      - release-src/
    expire_in: 30 days

# -------------------------------------------------------
# Upload artifacts to Generic Package Registry
# -------------------------------------------------------
upload:artifacts:
  stage: release
  image: alpine:latest
  rules: *rule_release
  needs:
    - package:macos
    - package:source
  before_script:
    - apk add --no-cache curl
  script:
    - PACKAGE_VERSION="${CI_COMMIT_TAG#v}"
    - |
      for f in release/*.dmg release/*.zip; do
        [ -f "$f" ] || continue
        basename="$(basename "$f")"
        echo "Uploading $basename to Generic Package Registry..."
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/buddy-macos/${PACKAGE_VERSION}/${basename}"
      done
    - |
      for f in release-src/*; do
        [ -f "$f" ] || continue
        basename="$(basename "$f")"
        echo "Uploading $basename to Generic Package Registry..."
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/buddy-macos/${PACKAGE_VERSION}/${basename}"
      done

# -------------------------------------------------------
# GitLab Release
# -------------------------------------------------------
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules: *rule_release
  needs:
    - job: upload:artifacts
      artifacts: false
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Buddy $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: "macOS DMG (arm64)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/buddy-macos/${CI_COMMIT_TAG#v}/Buddy-${CI_COMMIT_TAG#v}-arm64.dmg"
          link_type: package
        - name: "macOS DMG (x64)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/buddy-macos/${CI_COMMIT_TAG#v}/Buddy-${CI_COMMIT_TAG#v}-x64.dmg"
          link_type: package
        - name: "Source (.tar.gz)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/buddy-macos/${CI_COMMIT_TAG#v}/buddy-macos-${CI_COMMIT_TAG}-source.tar.gz"
          link_type: package
        - name: "Source (.zip)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/buddy-macos/${CI_COMMIT_TAG#v}/buddy-macos-${CI_COMMIT_TAG}-source.zip"
          link_type: package
