<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3932"/>
      <stop offset="100%" stop-color="#0f1f1a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="url(#ring)" stroke-width="28" opacity="0.7"/>
  <!-- Inner glow ring -->
  <circle cx="512" cy="512" r="310" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.3"/>
  <!-- Orbit dot top-right -->
  <circle cx="756" cy="310" r="16" fill="#4ade80" opacity="0.9"/>
  <!-- Orbit dot bottom-left -->
  <circle cx="268" cy="714" r="12" fill="#4ade80" opacity="0.7"/>
  <!-- B letter -->
  <text x="512" y="540" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="420" font-weight="700" fill="url(#letter)" letter-spacing="-8">B</text>
</svg>
